# CI 게이트 — PR·main 푸시마다 spec-lint + 단위 테스트를 기계적으로 강제한다.
# 목적: 세션 모델(Fable/Opus/…)이 바뀌어도 품질 바닥선은 기계가 지키게 (HANDOFF §5 참고).
# 참고: 데일리 파이프라인의 GITHUB_TOKEN 푸시(index.html·상태파일)는 GitHub 정책상
# 워크플로우를 재트리거하지 않으므로 이 CI가 이중 실행되지 않는다.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Spec lint (REPORT_SPEC gate)
        run: npm run spec-lint

      - name: Unit tests
        run: npm run test:unit
