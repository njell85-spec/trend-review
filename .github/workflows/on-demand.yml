name: On-demand Analysis (직접 지정)

# 대시보드 "직접 지정 분석" 위젯(또는 Actions 수동 실행)에서 트리거.
# 데일리와 동일한 분석 경로로 지정 논문/가이드라인을 처리한다 (REPORT_SPEC §1-B).
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'PMID 또는 DOI'
        required: true
        type: string
      kind:
        description: '종류'
        required: false
        default: 'paper'
        type: choice
        options: [paper, guideline]

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Spec lint (REPORT_SPEC gate)
        run: npm run spec-lint

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Trust workspace for Claude CLI
        run: |
          node -e "const fs=require('fs'),os=require('os'),path=require('path');const p=path.join(os.homedir(),'.claude.json');let j={};try{j=JSON.parse(fs.readFileSync(p,'utf8'))}catch{};j.projects=j.projects||{};const ws=process.env.GITHUB_WORKSPACE;j.projects[ws]=Object.assign({},j.projects[ws],{hasTrustDialogAccepted:true});fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('trusted:',ws)"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # inputs 는 env 로만 전달 — run 에 ${{ }} 직접 보간 시 셸 인젝션 가능(actions:write
      # 보유자가 임의 명령 실행). PAT 소지자는 신뢰 대상이지만 심층 방어로 차단한다.
      - name: Run on-demand analysis
        run: node scripts/on-demand.mjs "$OD_TARGET" "$OD_KIND"
        env:
          OD_TARGET: ${{ inputs.target }}
          OD_KIND:   ${{ inputs.kind }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          PUBMED_API_KEY:    ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL:      ${{ secrets.PUBMED_EMAIL }}
          UNPAYWALL_EMAIL:   ${{ secrets.PUBMED_EMAIL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}

      # 상태파일 동기화 — 데일리와 동일 패턴 (publisher가 index+selected를 이미 커밋·push,
      # analysis_archive 만 여기서 추가 커밋). publish()가 push까지 마쳐 local==origin 이므로
      # 별도 pull/rebase 없이 add→commit→push. (pull --rebase는 REST 폴백 시 rebase 충돌을
      # || true 로 삼켜 충돌 마커를 커밋할 위험이 있어 제거 — 실패는 조용히 삼키지 않는다.)
      - name: Commit state (archive)
        run: |
          for f in output/analysis_archive.json output/selected_papers.json output/selected_guidelines.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --staged --quiet \
            && echo "state unchanged" \
            || (git commit -m "chore: sync on-demand state" && git push)
