name: Daily EM/CCM Trend Review

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 06:30 KST
  workflow_dispatch:          # 수동 실행

permissions:
  contents: write             # GITHUB_TOKEN으로 push 허용 (PAT 불필요)

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 분석 LLM 호출 경로:
      #   1) claude CLI(구독) — CLAUDE_CODE_OAUTH_TOKEN 시크릿이 있으면 사용 (API 비용 없음)
      #   2) Anthropic API   — ANTHROPIC_API_KEY 시크릿이 있으면 폴백 (CLI 미설치/미인증 시)
      # 둘 중 하나는 저장소 Secrets 에 등록해야 자동화가 동작한다.
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run daily review pipeline
        run: node github-actions-daily.mjs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          PUBMED_API_KEY:    ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL:      ${{ secrets.PUBMED_EMAIL }}
          UNPAYWALL_EMAIL:   ${{ secrets.PUBMED_EMAIL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}

      # 위 스크립트가 index.html을 커밋·푸시한 뒤 selected_papers.json도 갱신하므로
      # 두 번째 커밋으로 exclusion list 상태를 동기화한다.
      - name: Commit exclusion list
        run: |
          git add output/selected_papers.json
          git diff --staged --quiet \
            && echo "exclusion list unchanged" \
            || (git commit -m "chore: sync paper exclusion list" && git push)
