name: Daily EM/CCM Trend Review

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 06:30 KST
  workflow_dispatch:          # 수동 실행

permissions:
  contents: write             # GITHUB_TOKEN으로 push 허용 (PAT 불필요)

jobs:
  review:
    runs-on: ubuntu-latest
    # 세션 한도(429) 시 최대 SESSION_RETRY_MAX회(기본 3회)를 SESSION_RETRY_DELAY_MIN
    # 간격(기본 60분)으로 재시도하므로, 잡이 재시도 대기 동안 러너를 붙잡는다.
    # public 저장소는 Actions 분(minutes)이 무료이며, 6h 기본 한도 안에서 넉넉히 마친다.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 분석 LLM 호출 경로:
      #   1) claude CLI(구독) — CLAUDE_CODE_OAUTH_TOKEN 시크릿이 있으면 사용 (API 비용 없음)
      #   2) Anthropic API   — ANTHROPIC_API_KEY 시크릿이 있으면 폴백 (CLI 미설치/미인증 시)
      # 둘 중 하나는 저장소 Secrets 에 등록해야 자동화가 동작한다.
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # CI는 신뢰 대화상자를 못 띄우므로, 워크스페이스를 미리 신뢰 처리한다.
      # (claude CLI가 .claude/settings.json 을 읽으려면 workspace trust 필요)
      - name: Trust workspace for Claude CLI
        run: |
          node -e "const fs=require('fs'),os=require('os'),path=require('path');const p=path.join(os.homedir(),'.claude.json');let j={};try{j=JSON.parse(fs.readFileSync(p,'utf8'))}catch{};j.projects=j.projects||{};const ws=process.env.GITHUB_WORKSPACE;j.projects[ws]=Object.assign({},j.projects[ws],{hasTrustDialogAccepted:true});fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('trusted:',ws)"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run daily review pipeline
        run: node github-actions-daily.mjs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          PUBMED_API_KEY:    ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL:      ${{ secrets.PUBMED_EMAIL }}
          UNPAYWALL_EMAIL:   ${{ secrets.PUBMED_EMAIL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}
          # 재시도 정책 튜닝(선택): 저장소 Variables 에 설정하면 코드 수정 없이 조정된다.
          # 미설정 시 기본값(3회 / 60분)이 적용된다. timeout-minutes 도 함께 고려할 것.
          SESSION_RETRY_MAX:       ${{ vars.SESSION_RETRY_MAX }}
          SESSION_RETRY_DELAY_MIN: ${{ vars.SESSION_RETRY_DELAY_MIN }}

      # 위 스크립트가 index.html을 커밋·푸시한 뒤 selected_papers.json도 갱신하므로
      # 두 번째 커밋으로 exclusion list 상태를 동기화한다.
      - name: Commit exclusion list
        run: |
          git add output/selected_papers.json
          git diff --staged --quiet \
            && echo "exclusion list unchanged" \
            || (git commit -m "chore: sync paper exclusion list" && git push)
