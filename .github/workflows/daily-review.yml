name: Daily EM/CCM Trend Review

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 06:30 KST
  workflow_dispatch:          # 수동 실행

permissions:
  contents: write             # GITHUB_TOKEN으로 push 허용 (PAT 불필요)

jobs:
  review:
    runs-on: ubuntu-latest
    # 세션 한도(429) 시 최대 SESSION_RETRY_MAX회(기본 3회)를 SESSION_RETRY_DELAY_MIN
    # 간격(기본 60분)으로 재시도하므로, 잡이 재시도 대기 동안 러너를 붙잡는다.
    # public 저장소는 Actions 분(minutes)이 무료이며, 6h 기본 한도 안에서 넉넉히 마친다.
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Phase 3 영상 슬라이드 렌더용 chromium (ENABLE_VIDEO=true일 때 사용).
      # 캐시로 설치 시간을 상쇄 — 미사용 실행에서도 무해(설치만 하고 안 씀).
      - name: Cache Playwright chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}
      - name: Install Playwright chromium
        run: npm i --no-save playwright && npx playwright install chromium --with-deps

      # 스펙 정합 게이트 — REPORT_SPEC 위반(채널 드리프트·옛 표현·상태파일
      # gitignore 회귀)이 있으면 파이프라인을 돌리기 전에 중단한다.
      - name: Spec lint (REPORT_SPEC gate)
        run: npm run spec-lint

      # 분석 LLM 호출 경로:
      #   1) claude CLI(구독) — CLAUDE_CODE_OAUTH_TOKEN 시크릿이 있으면 사용 (API 비용 없음)
      #   2) Anthropic API   — ANTHROPIC_API_KEY 시크릿이 있으면 폴백 (CLI 미설치/미인증 시)
      # 둘 중 하나는 저장소 Secrets 에 등록해야 자동화가 동작한다.
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      # CI는 신뢰 대화상자를 못 띄우므로, 워크스페이스를 미리 신뢰 처리한다.
      # (claude CLI가 .claude/settings.json 을 읽으려면 workspace trust 필요)
      - name: Trust workspace for Claude CLI
        run: |
          node -e "const fs=require('fs'),os=require('os'),path=require('path');const p=path.join(os.homedir(),'.claude.json');let j={};try{j=JSON.parse(fs.readFileSync(p,'utf8'))}catch{};j.projects=j.projects||{};const ws=process.env.GITHUB_WORKSPACE;j.projects[ws]=Object.assign({},j.projects[ws],{hasTrustDialogAccepted:true});fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('trusted:',ws)"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run daily review pipeline
        run: node github-actions-daily.mjs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          PUBMED_API_KEY:    ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL:      ${{ secrets.PUBMED_EMAIL }}
          UNPAYWALL_EMAIL:   ${{ secrets.PUBMED_EMAIL }}
          # Phase 2/3 — Google Drive·YouTube·TTS (미설정 시 해당 단계만 소프트 스킵)
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TTS_API_KEY:     ${{ secrets.GOOGLE_TTS_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          # 영상 데일리 편입 스위치 — 샘플 승인(§4-F) 후 Variables에서 true로
          ENABLE_VIDEO:           ${{ vars.ENABLE_VIDEO }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}
          # 재시도 정책 튜닝(선택): 저장소 Variables 에 설정하면 코드 수정 없이 조정된다.
          # 미설정 시 기본값(3회 / 60분)이 적용된다. timeout-minutes 도 함께 고려할 것.
          SESSION_RETRY_MAX:       ${{ vars.SESSION_RETRY_MAX }}
          SESSION_RETRY_DELAY_MIN: ${{ vars.SESSION_RETRY_DELAY_MIN }}

      # 스크립트가 index.html 커밋·푸시 후 상태파일(선정 논문 제외목록 + 가이드라인 주간
      # 게이트)을 갱신하므로, 두 번째 커밋으로 그 상태를 동기화한다.
      # selected_guidelines.json 을 커밋해야 "주 1회 + 중복방지"가 실행 간 유지된다.
      - name: Commit daily state (papers + guideline gate + archive/video)
        run: |
          git add output/selected_papers.json
          for f in output/selected_guidelines.json output/analysis_archive.json output/video_log.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --staged --quiet \
            && echo "state unchanged" \
            || (git commit -m "chore: sync daily state (papers + guideline gate + archive/video)" && git push)

  # push 성공 ≠ 사이트 반영. GitHub 측 Pages 배포가 일시 오류로 실패하면
  # 카톡 링크가 전날 데이터를 보여준다(2026-07-05 실제 발생). 배포 완료를
  # 확인하고 실패 시 자동 재실행, 끝내 실패하면 카카오 알림 + 워크플로우 실패.
  # 별도 잡인 이유: 재실행에 필요한 actions:write 토큰을 LLM 파이프라인 잡
  # (외부 콘텐츠를 다루는 단계)에 쥐여 주지 않기 위한 권한 분리.
  verify-pages:
    needs: review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read          # 스크립트 실행용 체크아웃 + 원격 main 조회
      actions: write          # 실패한 Pages 배포 런 재실행
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Pages deployment (auto-retry)
        run: node scripts/verify-pages-deploy.mjs
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
